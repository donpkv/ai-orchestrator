apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-controller-config
  namespace: ai-orchestrator
data:
  DB_SHARD_A_URL: "jdbc:postgresql://postgres-shard-a-svc:5432/orchestrator"
  DB_SHARD_B_URL: "jdbc:postgresql://postgres-shard-b-svc:5432/orchestrator"
  DB_USER: "admin"
  DB_PASSWORD: "admin123"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-svc:9092"
  QDRANT_HOST: "qdrant-svc"
  QDRANT_PORT: "6333"
  OLLAMA_BASE_URL: "http://ollama-svc:11434"
  SPRING_REDIS_HOST: "redis-svc"
  SPRING_REDIS_PORT: "6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-controller
  namespace: ai-orchestrator
  labels:
    app: workflow-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-controller
  template:
    metadata:
      labels:
        app: workflow-controller
    spec:
      containers:
        - name: workflow-controller
          image: local-ai/workflow-controller:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: workflow-controller-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-controller-svc
  namespace: ai-orchestrator
spec:
  type: ClusterIP
  selector:
    app: workflow-controller
  ports:
    - port: 8081
      targetPort: 8081
