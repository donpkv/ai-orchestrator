apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: ai-orchestrator
data:
  SPRING_PROFILES_ACTIVE: "k8s"
  # In production: replace with your actual frontend domain, e.g. https://orchestrator.yourdomain.com
  ALLOWED_ORIGINS: "http://localhost:3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ai-orchestrator
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: local-ai/api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-gateway-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 150
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: ai-orchestrator
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
